<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadeau</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background: #d63384;
  }

  .container {
    display: flex;
    width: 100vw;
    height: 100vh;
  }

  .container img {
    width: 50%;
    height: 100%;
    object-fit: contain; /* 🔥 Affiche toute l’image sans la couper */
    background: #d63384;    /* Fond neutre autour si l’image ne remplit pas tout */
  }
</style>
</head>
<body>
  <div class="container">
    <img src="carte-fia.png" alt="Carte FIA Emma Penvern">
    <img src="montage-horizontal.png" alt="Montage Team Penvern">
  </div>
</body>
</html>
