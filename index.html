<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Une surprise pour toi ❤️</title>

  <style>
    body {
      background: #ffe6f2;
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 40px;
      color: #d63384;
      opacity: 0;
      transition: opacity 1s ease;
    }

    h1 {
      font-size: 2.4rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 30px;
    }

    .cards {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      width: 200px;
      height: 280px;
      perspective: 1000px;
      cursor: pointer;
    }

    .inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.8s;
    }

    .card.flipped .inner {
      transform: rotateY(180deg);
    }

    .front, .back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .front {
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 3rem;
    }

    .back {
      transform: rotateY(180deg);
      overflow: hidden;
    }

    .back img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 12px;
    }
  </style>

  <script>
    window.onload = () => {
      document.body.style.opacity = 1;
    };

    function goTo(url) {
      document.body.style.opacity = 0;
      setTimeout(() => {
        window.location.href = url;
      }, 1000);
    }

    let flipped = 0;

    function flipCard(card) {
      if (!card.classList.contains("flipped")) {
        card.classList.add("flipped");
        flipped++;

        if (flipped === 3) {
          goTo("suspense.html");
        }
      }
    }
  </script>
</head>

<body>

  <h1>Joyeux anniversaire mon Doudou ❤️</h1>
  <p>Retourne les <strong>cartes</strong> pour découvrir ta surprise.</p>

  <div class="cards">
    <div class="card" onclick="flipCard(this)">
      <div class="inner">
        <div class="front">🎀</div>
        <div class="back"><img src="mini.jpg"></div>
      </div>
    </div>

    <div class="card" onclick="flipCard(this)">
      <div class="inner">
        <div class="front">🎀</div>
        <div class="back"><img src="m5.jpg"></div>
      </div>
    </div>

    <div class="card" onclick="flipCard(this)">
      <div class="inner">
        <div class="front">🎀</div>
        <div class="back"><img src="gt4rs-rose.jpg"></div>
      </div>
    </div>
  </div>

</body>
</html>
